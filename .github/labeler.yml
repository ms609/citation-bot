core:
  - changed-files:
    - any-glob-to-any-file:
      - src/includes/Template.php
      - src/includes/Parameter.php
      - src/includes/Page.php

api:
  - changed-files:
    - any-glob-to-any-file:
      - src/includes/api/*

tests:
  - changed-files:
    - any-glob-to-any-file:
      - tests/**/*

docs:
  - changed-files:
    - any-glob-to-any-file:
      - docs/**/*
      - '*.md'

ci:
  - changed-files:
    - any-glob-to-any-file:
      - .github/workflows/*
      - .github/dependabot.yml
      - .github/labeler.yml

docker:
  - changed-files:
    - any-glob-to-any-file:
      - Dockerfile
      - docker-compose.yml

config:
  - changed-files:
    - any-glob-to-any-file:
      - phpunit.xml.dist
      - composer.json
      - composer.lock
      - progpilot.yml
      - progpilot.json
      - .phpcs.xml
      - .phplint.yml
      - phpstan.neon
      - psalm.xml
      - .trivyignore
      - .markdownlint-cli2.yaml
