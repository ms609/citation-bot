name: Link checker

on:
  schedule:
    - cron: '25 17 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lychee:
    runs-on: ubuntu-24.04

    steps:
    - name: Checkout Repo
      uses: actions/checkout@v7.0.0

    - name: Check links
      uses: lycheeverse/lychee-action@v2.8.0
      with:
        args: '--no-progress --include-mail "**/*.md" "**/*.html"'
